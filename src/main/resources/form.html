<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HealthDCAT-AP Configuration</title>
    <style>
        html { font-family: Arial, Helvetica, sans-serif; }
        form .field { padding: .5em 1em; display: flex; flex-wrap: wrap; flex-grow: 1; flex-basis: 100%; max-width: calc(100% - 2em); }
        form .field label { min-width: 20em; margin-bottom: .5em; font-weight: bold; }
        form .field label:has(+ .field) { flex-grow: 1; flex-basis: 100%; }
        form .field label + *:not([type=checkbox]) { flex-grow: 1; max-width: 100%; }
        form > .field:nth-child(even) { background: #f0f0f0; }
        form > .field > label { padding: 0; }
        form .field input:not([type=checkbox]), form .field select, form .field textarea { padding: .3em; border: 1px solid #d0d0d0; border-radius: .25em; }
        .info { background: #c3defa; border: 1px solid #153860; color: #153860; padding: 1em; border-radius: .5em; }
        form .field button { padding: .5em 1em; border-radius: .25em; border: 1px solid #286015; background: #3a8121; color: white; font-size: 1.1rem; cursor: pointer; }
        form .field label .desc { font-size: .9em; color: #555555; font-weight: lighter; display: block; }
        form .field.hidden { display: none; }
        h2 { border-bottom: 2px solid #333; padding-bottom: 0.5rem; margin-top: 2rem; }
        .job-banner { background: #2c5282; color: white; padding: 0.75em 1.2em; border-radius: 0.5em; margin: 1em 0; font-size: 1.1rem; font-weight: bold; }
        .job-banner .job-name { text-transform: uppercase; }
    </style>
</head>
<body>
<p class="info">Fill the form below and submit to proceed with RDF metadata extraction.</p>
{{job-banner}}
<form method="post" action="/form">

    <div id="catalog-section" {{catalog-section-style}}>
    <h2>Catalog</h2>
    <div class="field">
        <label>Existing?</label>
        <input onchange="toggleExisting(this.checked)" type="checkbox" name="existingCatalog">
    </div>
    <div class="field hidden existing-catalog-field required">
        <label>URI</label>
        <input name="catalogUri" placeholder="{{catalog-uri}}">
    </div>
    <div class="field new-catalog-field required">
        <label>Title<i style="color: red">*</i></label>
        <input name="catalogTitle" required placeholder="{{catalog-title}}">
    </div>
    <div class="field new-catalog-field required">
        <label>Description<i style="color: red">*</i></label>
        <textarea required name="catalogDescription" placeholder="{{catalog-description}}"></textarea>
    </div>
    <div class="field new-catalog-field required">
        <label>Applicable Legislation<i style="color: red">*</i></label>
        <input name="catalogApplicableLegislation" required placeholder="{{catalog-applicable-legislation}}">
    </div>
    <div class="field new-catalog-field">
        <label>Spatial Coverage (Catalog)</label>
        <select name="catalogSpatial">
            <option value="" disabled selected hidden>Select a country</option>
            {{countryOptions}}
        </select>
    </div>

    </div><!-- end catalog-section -->

    <h2>Dataset</h2>
    <div class="field">
        <label>Title<i style="color: red">*</i></label>
        <input name="title" required placeholder="{{title}}">
    </div>
    <div class="field">
        <label>Version</label>
        <input name="datasetVersion" placeholder="{{dataset-version}}">
    </div>
    <div class="field">
        <label>Description<i style="color: red">*</i></label>
        <textarea required name="description" placeholder="{{description}}"></textarea>
    </div>
    <div class="field">
        <label>Quality Annotation<i style="color: red">*</i></label>
        <textarea name="datasetQualityAnnotation" required placeholder="{{dataset-quality-annotation}}"></textarea>
    </div>
    <div class="field">
        <label>Theme<i style="color: red">*</i></label>
        <select name="theme" required>
            <option value="" disabled selected hidden>Select a theme</option>
            {{themeOptions}}
        </select>
    </div>
    <div class="field">
        <label>Provenance<i style="color: red">*</i></label>
        <textarea name="provenance" required placeholder="{{provenance}}"></textarea>
    </div>
    <div class="field">
        <label>
            Keyword(s)<i style="color: red">*</i>
            <span class="desc">Comma separated keywords</span>
        </label>
        <input name="keyword" required placeholder="{{keyword}}">
    </div>
    <div class="field">
        <label>Geographical Coverage<i style="color: red">*</i></label>
        <select name="datasetSpatial" required>
            <option value="" disabled selected hidden>Select a country</option>
            {{countryOptions}}
        </select>
    </div>
    <div class="field">
        <label>Population Coverage</label>
        <input name="populationCoverage" placeholder="{{population-coverage}}">
    </div>
    <div class="field">
        <label>Update Frequency</label>
        <select name="datasetFrequency">
            <option value="" disabled selected hidden>Select a frequency</option>
            {{frequencyOptions}}
        </select>
    </div>
    <div class="field">
        <label>Identifier<i style="color: red">*</i></label>
        <input name="identifier" required placeholder="{{identifier}}">
    </div>
    <div class="field">
        <label>Contact Point<i style="color: red">*</i></label>
        <div class="field">
            <label>Page</label>
            <input type="url" name="contactPage" placeholder="{{contact-page}}">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" name="contactEmail" placeholder="{{contact-email}}">
        </div>
    </div>

    <div class="field">
        <label>Publisher (Data Holder)</label>
        <div class="field">
            <label>Name</label>
            <input name="publisherName" placeholder="{{publisher-name}}">
        </div>
        <div class="field">
            <label>Type</label>
            <select name="publisherType">
                <option value="" disabled selected hidden>Select a type</option>
                {{hdabTypeOptions}}
            </select>
        </div>
        <div class="field">
            <label>Contact Point</label>
            <div class="field">
                <label>Page</label>
                <input type="url" name="publisherPage" placeholder="{{publisher-page}}">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" name="publisherEmail" placeholder="{{publisher-email}}">
            </div>
        </div>
        <div class="field">
            <label>Trusted data holder</label>
            <input type="checkbox" name="publisherTrusted">
        </div>
    </div>

    <div class="field">
        <label>Health Data Access Body<i style="color: red">*</i></label>
        <div class="field">
            <label>Name<i style="color: red">*</i></label>
            <input name="hdabName" required placeholder="{{hdab-name}}">
        </div>
        <div class="field">
            <label>Type</label>
            <select name="hdabType">
                <option value="" disabled selected hidden>Select a type</option>
                {{hdabTypeOptions}}
            </select>
        </div>
        <div class="field">
            <label>Contact Point</label>
            <div class="field">
                <label>Page</label>
                <input type="url" name="hdabContactPage" placeholder="{{hdab-contact-page}}">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" name="hdabContactEmail" placeholder="{{hdab-contact-email}}">
            </div>
        </div>
        <div class="field">
            <label>Note</label>
            <textarea name="hdabNote" placeholder="{{hdab-note}}"></textarea>
        </div>
        <div class="field">
            <label>Trusted data holder</label>
            <input type="checkbox" name="hdabTrusted">
        </div>
    </div>

    <div class="field">
        <label>Applicable Legislation<i style="color: red">*</i></label>
        <input name="applicableLegislation" required placeholder="{{applicable-legislation}}">
    </div>
    <div class="field">
        <label>Access Rights<i style="color: red">*</i></label>
        <select name="accessRights" required>
            <option value="" disabled selected hidden>Select access right</option>
            {{accessRightsOptions}}
        </select>
    </div>
    <div class="field">
        <label>Type<i style="color: red">*</i></label>
        <select name="type" required>
            <option value="" disabled selected hidden>Select dataset type</option>
            {{typeOptions}}
        </select>
    </div>
    <div class="field">
        <label>Health Category<i style="color: red">*</i></label>
        <select name="healthCategory" required>
            <option value="" disabled selected hidden>Select a health category</option>
            {{healthCategoryOptions}}
        </select>
    </div>
    <div class="field">
        <label>Health Theme<i style="color: red">*</i></label>
        <select name="healthTheme" required>
            <option value="" disabled selected hidden>Select a health theme</option>
            {{healthThemeOptions}}
        </select>
    </div>

    <h2>Distribution</h2>
    <div class="field">
        <label>Access URL<i style="color: red">*</i></label>
        <input required type="url" name="distributionAccessUrl" placeholder="{{distribution-access-url}}">
    </div>
    <div class="field">
        <label>License</label>
        <input name="distributionLicense" placeholder="{{distribution-license}}">
    </div>
    <div class="field">
        <label>Applicable Legislation<i style="color: red">*</i></label>
        <input required name="distributionApplicableLegislation" placeholder="{{distribution-applicable-legislation}}">
    </div>
    <div class="field">
        <label>Format</label>
        <select name="distributionFormat">
            <option value="" disabled selected hidden>Select format</option>
            {{fileTypeOptions}}
        </select>
    </div>
    <div class="field">
        <label>Description</label>
        <input name="distributionDescription" placeholder="{{distribution-description}}">
    </div>

    <h3>Sample Distribution</h3>
    <div class="field">
        <label>Sample Title</label>
        <input name="sampleTitle" placeholder="{{sample-title}}">
    </div>
    <div class="field">
        <label>Sample Access URL</label>
        <input type="url" name="sampleAccessUrl" placeholder="{{sample-access-url}}">
    </div>
    <div class="field">
        <label>Sample Format</label>
        <select name="sampleFormat">
            <option value="" disabled selected hidden>Select format</option>
            {{fileTypeOptions}}
        </select>
    </div>
    <div class="field">
        <label>Sample Legislation</label>
        <input name="sampleLegislation" placeholder="{{sample-legislation}}">
    </div>

    <div class="field" style="flex-direction: row-reverse">
        <button type="submit">Submit</button>
    </div>
</form>
<script>
    function toggleExisting(value) {
        const toHide = value ? document.querySelectorAll(".new-catalog-field") : document.querySelectorAll(".existing-catalog-field");
        const toShow = !value ? document.querySelectorAll(".new-catalog-field") : document.querySelectorAll(".existing-catalog-field");
        toShow.forEach(item => {
            item.classList.remove('hidden')
            if (item.classList.contains('required')) {
                item.querySelectorAll('input,textarea').forEach(input => input.setAttribute('required', true))
            }
        });
        toHide.forEach(item => {
            item.classList.add('hidden');
            item.querySelectorAll('input,textarea').forEach(input => input.removeAttribute('required'))
        });
    }
    // When catalog section is hidden (subsequent jobs), disable all required fields inside it
    document.addEventListener('DOMContentLoaded', function() {
        var catalogSection = document.getElementById('catalog-section');
        if (catalogSection && catalogSection.style.display === 'none') {
            catalogSection.querySelectorAll('input,textarea,select').forEach(function(el) {
                el.removeAttribute('required');
                el.disabled = true;
            });
        }
    });
</script>
</body>
</html>
